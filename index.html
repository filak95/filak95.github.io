<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>TodayBingo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas class="particle-canvas" id="particleCanvas"></canvas>
  <div class="bg-transition-layer" id="bgTransitionLayer"></div>
  <div class="app-layout">
    <header class="header">
      <div class="header-left">
        <button type="button" class="menu-btn" id="menuBtn" title="菜单">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1 class="header-title">TodayBingo</h1>
      </div>
      <div class="header-right">
        <button type="button" class="icon-btn" id="settingsBtn" title="设置">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button type="button" class="icon-btn" id="themeToggle" title="切换主题">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="content">
        <div class="screen active" id="screenEmpty">
          <div class="empty-state">
            <p>还没有 Bingo 表，创建一个吧</p>
            <button type="button" class="btn-primary" id="btnCreateFirst">创建第一个 Bingo 表</button>
          </div>
        </div>

        <div class="screen" id="screenCreate">
          <div class="create-screen">
            <div class="form-group">
              <label for="tableName">表名称</label>
              <input type="text" id="tableName" placeholder="例如：今日工作、生活打卡" maxlength="30" />
            </div>
            <div class="form-group">
              <label for="wordsInput">词条（每行一个）</label>
              <textarea id="wordsInput" placeholder="输入词条，每行一个&#10;例如：&#10;晨跑&#10;阅读&#10;..." rows="12"></textarea>
              <p class="hint" id="wordsCountHint"></p>
              <p class="hint hint-char" id="wordsCharHint"></p>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" id="btnCancelEdit" style="display:none;">取消</button>
              <button type="button" class="btn-primary" id="btnGenerate">生成 Bingo 表</button>
            </div>
          </div>
        </div>

        <div class="screen" id="screenBoard">
          <h2 class="table-name" id="boardTableName"></h2>
          <div class="grid-size-selector-wrapper">
            <div class="grid-size-selector" id="boardGridSizeSelector">
              <button type="button" class="grid-size-option" data-size="5">
                <span class="grid-size-option-text"><span class="line1">5×5</span></span>
              </button>
              <button type="button" class="grid-size-option" data-size="4">
                <span class="grid-size-option-text"><span class="line1">4×4</span></span>
              </button>
              <button type="button" class="grid-size-option" data-size="3">
                <span class="grid-size-option-text"><span class="line1">3×3</span></span>
              </button>
            </div>
          </div>
          <div class="board-container">
            <div class="board" id="board"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h2>Bingo 列表</h2>
    </div>
    <div class="drawer-list" id="drawerList"></div>
    <button type="button" class="drawer-add" id="drawerAdd">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      新建 Bingo 表
    </button>
  </div>

  <div class="settings-sheet-overlay" id="settingsSheetOverlay">
    <div class="settings-sheet">
      <div class="settings-sheet-title">设置</div>
      <div class="settings-content">
        <div class="setting-item">
          <div class="setting-label">
            <span>主题风格</span>
          </div>
          <div class="theme-selector">
            <div class="theme-option" data-theme="glass">
              <div class="theme-option-icon glass"></div>
              <span>玻璃</span>
            </div>
            <div class="theme-option active" data-theme="classic">
              <div class="theme-option-icon classic"></div>
              <span>经典</span>
            </div>
          </div>
        </div>

        <div class="setting-item" id="bgSelectorItem" style="display:none;">
          <div class="setting-label">
            <span>背景环境</span>
          </div>
          <div class="bg-selector">
            <div class="bg-option active" data-bg="sunset">
              <div class="bg-option-gradient sunset"></div>
              <span class="bg-option-label">夕阳</span>
            </div>
            <div class="bg-option" data-bg="dunes">
              <div class="bg-option-gradient dunes"></div>
              <span class="bg-option-label">沙丘</span>
            </div>
            <div class="bg-option" data-bg="fog">
              <div class="bg-option-gradient fog"></div>
              <span class="bg-option-label">雾气</span>
            </div>
            <div class="bg-option" data-bg="ocean">
              <div class="bg-option-gradient ocean"></div>
              <span class="bg-option-label">海洋</span>
            </div>
            <div class="bg-option" data-bg="forest">
              <div class="bg-option-gradient forest"></div>
              <span class="bg-option-label">森林</span>
            </div>
            <div class="bg-option" data-bg="night">
              <div class="bg-option-gradient night"></div>
              <span class="bg-option-label">夜空</span>
            </div>
            <div class="bg-option custom" data-bg="custom" id="customBgOption">
              <div class="bg-option-placeholder">导入图片</div>
              <img id="customBgPreview" alt="自定义背景" />
              <span class="bg-option-label">自定义</span>
            </div>
          </div>
          <div class="bg-actions">
            <button type="button" class="bg-action-btn" id="bgImportBtn">选择图片</button>
            <button type="button" class="bg-action-btn" id="bgResetBtn">恢复默认</button>
          </div>
          <input type="file" id="bgFileInput" accept="image/*" style="display:none;" />
        </div>

        <div class="setting-item">
          <div class="setting-label">
            <span>按钮背景透明度</span>
            <span class="setting-value" id="opacityValue">50%</span>
          </div>
          <div class="slider-container">
            <input type="range" class="slider" id="opacitySlider" min="0" max="100" value="50">
          </div>
        </div>
      </div>
      <button type="button" class="settings-close" id="settingsClose">完成</button>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <button type="button" class="bottom-btn" id="btnReset">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
      重置
    </button>
    <button type="button" class="bottom-btn" id="btnShuffle">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
      打乱
    </button>
    <button type="button" class="bottom-btn" id="btnEdit">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      编辑
    </button>
    <button type="button" class="bottom-btn danger" id="btnDelete">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      删除
    </button>
  </div>

  <div class="delete-confirm" id="deleteConfirm">
    <div class="delete-confirm-dialog">
      <h3>删除确认</h3>
      <p id="deleteConfirmText">确定要删除这个 Bingo 表吗？</p>
      <div class="delete-confirm-actions">
        <button type="button" class="cancel-btn" id="deleteCancel">取消</button>
        <button type="button" class="confirm-btn" id="deleteConfirmBtn">删除</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="particles.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {});
    }
  </script>
</body>
</html>
