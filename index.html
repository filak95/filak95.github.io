<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>TodayBingo</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
      --ios-blue: #007AFF;
      --primary: #4A90E2;
      --primary-light: rgba(74, 144, 226, 0.15);
      --danger: #FF6B6B;
      --success: #4ECDC4;
      --bg: #F2F2F7;
      --card-bg: rgba(255,255,255,0.85);
      --text: #1a1a1a;
      --text-secondary: #666;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --cell-opacity: 0.5;
      --app-theme: classic;
    }

    :root[data-theme="dark"] {
      --primary: #5DADE2;
      --primary-light: rgba(93, 173, 226, 0.2);
      --bg: #1a1a1a;
      --card-bg: rgba(40,40,40,0.85);
      --text: #f0f0f0;
      --text-secondary: #aaa;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --primary: #5DADE2;
        --primary-light: rgba(93, 173, 226, 0.2);
        --bg: #1a1a1a;
        --card-bg: rgba(40,40,40,0.85);
        --text: #f0f0f0;
        --text-secondary: #aaa;
        --border: rgba(255,255,255,0.1);
        --shadow: 0 2px 12px rgba(0,0,0,0.3);
      }
    }

    /* Glass Theme Variables */
    :root[data-app-theme="glass"] {
      --glass-blur: blur(20px) saturate(180%);
      --glass-radius-lg: 28px;
      --glass-radius-md: 16px;
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.12);
      --glass-btn-bg: rgba(255,255,255,0.12);
      --glass-card-bg: rgba(255,255,255,0.15);
      --glass-text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    :root[data-app-theme="glass"][data-theme="dark"] {
      --glass-btn-bg: rgba(255,255,255,0.08);
      --glass-card-bg: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Glass Theme Background */
    :root[data-app-theme="glass"] body {
      background: var(--bg);
      position: relative;
    }

    :root[data-app-theme="glass"] body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: var(--bg-image, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
      background-size: cover;
      background-position: center;
      z-index: -2;
      filter: var(--bg-filter, none);
      transition: background-image 600ms ease-in-out, filter 600ms ease-in-out;
    }

    :root[data-app-theme="glass"] body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-overlay, rgba(0,0,0,0.3));
      z-index: -1;
      transition: background 600ms ease-in-out;
    }

    .app-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    :root[data-app-theme="glass"] .header {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      border-radius: 0 0 var(--glass-radius-md) var(--glass-radius-md);
      margin: 0 8px;
      width: calc(100% - 16px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    :root[data-app-theme="glass"] .menu-btn {
      background: var(--glass-btn-bg);
      border-radius: var(--glass-radius-md);
      box-shadow: var(--glass-shadow);
    }

    .menu-btn:active {
      background: var(--primary-light);
    }

    :root[data-app-theme="glass"] .menu-btn:active {
      background: rgba(255,255,255,0.2);
    }

    .menu-btn svg {
      width: 24px;
      height: 24px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    :root[data-app-theme="glass"] .header-title {
      text-shadow: var(--glass-text-shadow);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: var(--primary-light);
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
    }

    :root[data-app-theme="glass"] .icon-btn {
      background: var(--glass-btn-bg);
      border-radius: var(--glass-radius-md);
      box-shadow: var(--glass-shadow);
      color: var(--text);
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 16px;
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .screen.active {
      display: flex;
    }

    .table-name {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
      color: var(--text);
    }

    :root[data-app-theme="glass"] .table-name {
      text-shadow: var(--glass-text-shadow);
      color: var(--text);
    }

    .board-container {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      max-width: min(90vw, 400px);
      aspect-ratio: 1;
      max-height: 100%;
    }

    :root[data-app-theme="glass"] .board {
      gap: 10px;
    }

    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 13px;
      text-align: center;
      word-break: break-word;
      overflow: hidden;
      cursor: pointer;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
      box-shadow: var(--shadow);
      border: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    :root[data-app-theme="glass"] .cell {
      border-radius: var(--radius);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.35), inset 0 -6px 12px rgba(0,0,0,0.25);
      transition: background 150ms ease-out, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cell:active {
      transform: scale(0.94);
    }

    .cell.done {
      background: var(--ios-blue) !important;
      transform: scale(0.94);
      box-shadow: 0 4px 16px rgba(0,122,255,0.4);
      color: #fff !important;
    }

    :root[data-app-theme="glass"] .cell.done {
      background: rgba(0,0,0,0.3) !important;
      box-shadow: none;
      color: var(--text) !important;
    }

    .cell-text {
      position: relative;
      z-index: 1;
      line-height: 1.2;
      max-height: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-secondary);
    }

    :root[data-app-theme="glass"] .empty-state {
      color: var(--text-secondary);
    }

    .empty-state p {
      margin: 0 0 20px;
      font-size: 16px;
    }

    :root[data-app-theme="glass"] .empty-state p {
      text-shadow: var(--glass-text-shadow);
    }

    .btn-primary {
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: transform 0.2s, opacity 0.2s;
    }

    :root[data-app-theme="glass"] .btn-primary {
      background: var(--glass-btn-bg);
      border-radius: var(--glass-radius-md);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-primary:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    .create-screen {
      padding: 20px 0;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    .create-screen .form-group {
      margin-bottom: 20px;
    }

    .create-screen label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    :root[data-app-theme="glass"] .create-screen label {
      color: var(--text);
      text-shadow: var(--glass-text-shadow);
    }

    .create-screen input[type="text"],
    .create-screen textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 16px;
      font-family: inherit;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text);
      transition: border-color 0.2s;
    }

    :root[data-app-theme="glass"] .create-screen input[type="text"],
    :root[data-app-theme="glass"] .create-screen textarea {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--glass-radius-md);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      box-shadow: var(--glass-shadow);
    }

    :root[data-app-theme="glass"] .create-screen input[type="text"]::placeholder,
    :root[data-app-theme="glass"] .create-screen textarea::placeholder {
      color: var(--text-secondary);
    }

    .create-screen input[type="text"]:focus,
    .create-screen textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .create-screen textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.5;
    }

    .create-screen .hint {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    :root[data-app-theme="glass"] .create-screen .hint {
      color: var(--text-secondary);
    }

    .create-screen .hint-char {
      color: var(--danger);
    }

    .size-selector {
      display: flex;
      gap: 10px;
    }

    .size-option {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .size-option.active {
      border-color: var(--ios-blue);
      background: var(--primary-light);
    }

    :root[data-app-theme="glass"] .size-option {
      background: var(--glass-btn-bg);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: var(--glass-radius-md);
    }

    :root[data-app-theme="glass"] .size-option.active {
      border-color: var(--ios-blue);
      background: rgba(255,255,255,0.2);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-secondary {
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text);
    }

    :root[data-app-theme="glass"] .btn-secondary {
      background: var(--glass-btn-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--glass-radius-md);
      color: var(--text);
      box-shadow: var(--glass-shadow);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(64px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
    }

    :root[data-app-theme="glass"] .bottom-bar {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--glass-radius-md) var(--glass-radius-md) 0 0;
      margin: 0 12px;
      width: calc(100% - 24px);
      left: auto;
      right: auto;
    }

    .bottom-btn {
      flex: 1;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: color 0.2s, transform 0.2s;
    }

    :root[data-app-theme="glass"] .bottom-btn {
      color: var(--text-secondary);
    }

    .bottom-btn:active {
      transform: scale(0.94);
    }

    .bottom-btn svg {
      width: 24px;
      height: 24px;
    }

    .bottom-btn.danger {
      color: var(--danger);
    }

    /* Drawer */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    :root[data-app-theme="glass"] .drawer-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .drawer-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      max-width: 80vw;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 201;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    :root[data-app-theme="glass"] .drawer {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .drawer.visible {
      transform: translateX(0);
    }

    .drawer-header {
      padding: calc(var(--safe-top) + 16px) 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    :root[data-app-theme="glass"] .drawer-header {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .drawer-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    :root[data-app-theme="glass"] .drawer-header h2 {
      color: var(--text);
      text-shadow: var(--glass-text-shadow);
    }

    .drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .drawer-item {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    :root[data-app-theme="glass"] .drawer-item {
      color: var(--text);
      border-radius: var(--glass-radius-md);
    }

    .drawer-item:hover,
    .drawer-item:active {
      background: var(--primary-light);
    }

    :root[data-app-theme="glass"] .drawer-item:hover,
    :root[data-app-theme="glass"] .drawer-item:active {
      background: rgba(255,255,255,0.1);
    }

    .drawer-item.active {
      background: var(--primary);
      color: #fff;
    }

    :root[data-app-theme="glass"] .drawer-item.active {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .drawer-item-delete {
      color: var(--danger);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .drawer-item:hover .drawer-item-delete,
    .drawer-item:active .drawer-item-delete {
      opacity: 1;
    }

    .drawer-add {
      margin: 8px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--primary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    :root[data-app-theme="glass"] .drawer-add {
      border: 2px dashed rgba(255,255,255,0.3);
      color: var(--primary);
      border-radius: var(--glass-radius-md);
    }

    .drawer-add:active {
      background: var(--primary-light);
    }

    :root[data-app-theme="glass"] .drawer-add:active {
      background: rgba(255,255,255,0.1);
    }

    /* Settings Sheet */
    .settings-sheet-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }

    :root[data-app-theme="glass"] .settings-sheet-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .settings-sheet-overlay.visible {
      display: flex;
    }

    .settings-sheet {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }

    :root[data-app-theme="glass"] .settings-sheet {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--glass-radius-lg);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: var(--glass-shadow);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .settings-sheet-title {
      padding: 16px;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    :root[data-app-theme="glass"] .settings-sheet-title {
      color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-shadow: var(--glass-text-shadow);
    }

    .settings-content {
      padding: 20px 16px;
    }

    .setting-item {
      margin-bottom: 24px;
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    :root[data-app-theme="glass"] .setting-label {

</head>

      const BG_DB_STORE = 'images';
      const BG_CUSTOM_KEY = 'custom';

      function loadData() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : { 
            tables: [], 
            activeId: null, 
            theme: 'light',
            settings: {

      function uid() {
        return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
      }

      const MAX_CHARS = 8;

      function parseWords(text) {
        return text.split(/\n/).map(s => (s.trim().slice(0, MAX_CHARS))).filter(Boolean);
      }

      function adaptiveFontSize(text, cellSize) {
        const trimmed = (text || '').trim();
        const length = trimmed.length;
        const base = Math.max(12, Math.round(cellSize * 0.26));
        const min = Math.max(10, Math.round(cellSize * 0.16));
        if (!trimmed) return Math.round(cellSize * 0.2);
        if (/^\d+$/.test(trimmed) && trimmed.length <= 2) return base;
        if (length <= 2) return base;
        const steps = Math.min(length - 2, 6);
        return Math.round(base - (base - min) * (steps / 6));
      }

      function openBackgroundDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(BG_DB_NAME, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(BG_DB_STORE)) {
              db.createObjectStore(BG_DB_STORE);
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function withBackgroundStore(mode, handler) {
        return openBackgroundDb().then(db => new Promise((resolve, reject) => {
          const tx = db.transaction(BG_DB_STORE, mode);
          const store = tx.objectStore(BG_DB_STORE);
          handler(store, resolve, reject);
          tx.oncomplete = () => db.close();
          tx.onerror = () => reject(tx.error);
        }));
      }

      function loadBackgroundBlob() {
        return withBackgroundStore('readonly', (store, resolve, reject) => {
          const req = store.get(BG_CUSTOM_KEY);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error);
        });
      }

      function saveBackgroundBlob(blob) {
        return withBackgroundStore('readwrite', (store, resolve, reject) => {
          const req = store.put(blob, BG_CUSTOM_KEY);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }

      function clearBackgroundBlob() {
        return withBackgroundStore('readwrite', (store, resolve, reject) => {
          const req = store.delete(BG_CUSTOM_KEY);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }

      function loadImageFromFile(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            resolve(img);
          };
          img.onerror = (e) => {
            URL.revokeObjectURL(url);
            reject(e);
          };
          img.src = url;
        });
      }

      function sampleBrightness(canvas) {
        const ctx = canvas.getContext('2d');
        const size = 40;
        const sample = document.createElement('canvas');
        sample.width = size;
        sample.height = size;
        const sampleCtx = sample.getContext('2d');
        sampleCtx.drawImage(canvas, 0, 0, size, size);
        const data = sampleCtx.getImageData(0, 0, size, size).data;
        let total = 0;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          total += (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        }
        return total / (data.length / 4);
      }

      async function processBackgroundFile(file) {
        const img = await loadImageFromFile(file);
        const size = Math.min(img.width, img.height);
        const outputSize = Math.min(1440, size);
        const canvas = document.createElement('canvas');
        canvas.width = outputSize;
        canvas.height = outputSize;
        const ctx = canvas.getContext('2d');
        const sx = Math.round((img.width - size) / 2);
        const sy = Math.round((img.height - size) / 2);
        ctx.drawImage(img, sx, sy, size, size, 0, 0, outputSize, outputSize);
        const brightness = sampleBrightness(canvas);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
        return { blob, brightness };
      }

      function cardGradient(index, opacity = 0.5) {
        const colors = [
          ['#FF6B6B', '#FF8E8E'],
          ['#4ECDC4', '#6EE7DE'],
          ['#45B7D1', '#6BC9DE'],
          ['#96CEB4', '#B4DFC9'],
          ['#FFEAA7', '#FFF3C7'],
          ['#DDA0DD', '#E8B8E8'],
          ['#98D8C8', '#B4E4D8'],
          ['#F7DC6F', '#F9E79F'],
          ['#BB8FCE', '#D2B4DE'],
          ['#85C1E9', '#AED6F1'],
          ['#F1948A', '#F5B7B1'],
          ['#82E0AA', '#A9DFBF'],
          ['#F8C471', '#FAD7A0'],
          ['#D7BDE2', '#E8DAEF'],
          ['#A3E4D7', '#B9F1E8'],
          ['#FADBD8', '#FDEDEC'],
          ['#D5F5E3', '#E9F7EF'],
          ['#FCF3CF', '#FEF9E7'],
          ['#EBDEF0', '#F5EEF8'],
          ['#D6EAF8', '#EBF5FB'],
          ['#FDEBD0', '#FEF5E7'],
          ['#E8DAEF', '#F4ECF7'],
          ['#D1F2EB', '#E8F8F5'],
          ['#FAD7A0', '#FDEBD0'],
          ['#D5DBDB', '#EAEDED']
        ];
        const color = colors[index % colors.length];
        return `linear-gradient(135deg, ${hexToRgba(color[0], opacity)}, ${hexToRgba(color[1], opacity)})`;
      }

      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function applyBackground() {
        const bg = state.data.settings.background || 'sunset';
        const theme = state.data.theme;
        const hasCustom = bg === 'custom' && state.bgImageUrl;
        const brightness = hasCustom
          ? state.data.settings.backgroundImageBrightness
          : (BG_BRIGHTNESS[bg] || 0.5);
        const overlayBase = theme === 'dark' ? 0.38 : 0.24;
        const overlayOpacity = Math.max(0.2, Math.min(0.6, overlayBase + (0.6 - brightness) * 0.35));
        const brightnessFactor = theme === 'dark'
          ? 0.72 + (0.18 * (1 - brightness))
          : 0.95 + (0.08 * (1 - brightness));
        const contrastFactor = theme === 'dark' ? 1.12 : 1.04;
        const backgroundValue = hasCustom ? `url("${state.bgImageUrl}")` : (BG_GRADIENTS[bg] || BG_GRADIENTS.sunset);
        document.documentElement.style.setProperty('--bg-image', backgroundValue);
        document.documentElement.style.setProperty('--bg-overlay', `rgba(0,0,0,${overlayOpacity})`);
        document.documentElement.style.setProperty('--bg-filter', `brightness(${brightnessFactor}) contrast(${contrastFactor})`);

      function renderBoard() {

        dom.boardTableName.textContent = t.name || '未命名';

        const size = t.size || 5;
        const total = size * size;
        const words = (t.words || []).slice(0, total);
        const order = (t.order && t.order.length === total)
          ? t.order
          : shuffleArray(words.map((_, i) => i));
        if (order !== t.order) {
          t.order = order;
          saveData(state.data);
        }
        const completedSet = new Set((t.completed || []).map(Number));
        const settings = state.data.settings;
        const opacity = settings.cellOpacity / 100;

        dom.board.innerHTML = '';

        dom.board.style.gridTemplateRows = `repeat(${size}, 1fr)`;
        const boardStyle = getComputedStyle(dom.board);
        const gap = parseFloat(boardStyle.gap || boardStyle.gridGap || 0);
        const boardWidth = dom.board.getBoundingClientRect().width || dom.board.clientWidth || 300;
        const cellSize = (boardWidth - gap * (size - 1)) / size;

      const BINGO_LINES_CACHE = {};

      function getBingoLines(size) {
        if (BINGO_LINES_CACHE[size]) return BINGO_LINES_CACHE[size];
        const lines = [];
        for (let r = 0; r < size; r++) {
          const row = [];
          for (let c = 0; c < size; c++) row.push(r * size + c);
          lines.push(row);
        }
        for (let c = 0; c < size; c++) {
          const col = [];
          for (let r = 0; r < size; r++) col.push(r * size + c);
          lines.push(col);
        }
        const diag1 = [];
        const diag2 = [];
        for (let i = 0; i < size; i++) {
          diag1.push(i * size + i);
          diag2.push(i * size + (size - 1 - i));
        }
        lines.push(diag1, diag2);
        BINGO_LINES_CACHE[size] = lines;
        return lines;
      }

      function checkBingoLine(completedSet, size) {
        return getBingoLines(size).some(line => line.every(i => completedSet.has(i)));
      }

      function runConfetti() {
        const duration = 1000;
        const animationEnd = Date.now() + duration;
        const colors = ['#007AFF', '#34C759', '#FF9500', '#FF3B30', '#AF52DE'];

        const interval = setInterval(() => {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) {
            clearInterval(interval);
            return;
          }

          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0, y: 0.3 },
            colors: colors
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1, y: 0.3 },
            colors: colors
          });
        }, 100);

        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 },
          colors: colors
        });
      }

      function toggleCell(table, index) {
        if (navigator.vibrate) navigator.vibrate(10);
        const completed = table.completed || [];
        const i = completed.indexOf(index);
        if (i === -1) completed.push(index);
        else completed.splice(i, 1);
        table.completed = completed;
        saveData(state.data);
        const cell = dom.board.querySelector(`[data-index="${index}"]`);
        if (cell) {
          cell.classList.toggle('done', completed.includes(index));
          if (!completed.includes(index)) {
            const settings = state.data.settings;
            const opacity = settings.cellOpacity / 100;
            if (settings.appTheme !== 'glass') {
              cell.style.background = cardGradient(table.order[index], opacity);
            }
          }
        }
        
        const set = new Set(completed.map(Number));
        if (checkBingoLine(set, table.size || 5)) {
          if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
          runConfetti();
        }
        advanceBackgroundTheme();
      }

      function shuffleBoard() {
        const t = state.activeTable;
        if (!t || !t.words) return;
        // Keep completed cells mapped to words, not positions
        const oldOrder = (t.order && t.order.length === t.words.length)
          ? t.order
          : shuffleArray(t.words.map((_, i) => i));
        t.order = oldOrder;
        const newOrder = shuffleArray(t.words.map((_, i) => i));
        
        // Map completed indices to words, then back to new positions
        const completedWords = (t.completed || []).map(idx => oldOrder[idx]);
        t.completed = [];
        completedWords.forEach(wordIdx => {
          const newPos = newOrder.indexOf(wordIdx);
          if (newPos !== -1) t.completed.push(newPos);
        });
        
        t.order = newOrder;
        saveData(state.data);
        renderBoard();
      }

      function resetBoard() {
        const t = state.activeTable;
        if (t) {
          t.completed = [];
          saveData(state.data);
          renderBoard();
        }
      }

      function showDeleteConfirm(id, name) {
        state.deleteTargetId = id;
        dom.deleteConfirmText.textContent = `确定要删除「${name || '未命名'}」吗？`;
        dom.deleteConfirm.classList.add('visible');
      }

      function hideDeleteConfirm() {
        dom.deleteConfirm.classList.remove('visible');
        state.deleteTargetId = null;
      }

      function deleteTable() {
        const id = state.deleteTargetId;
        if (!id) return;
        const index = state.data.tables.findIndex(t => t.id === id);
        if (index > -1) {
          state.data.tables.splice(index, 1);
          if (state.data.activeId === id) {
            state.data.activeId = state.data.tables.length > 0 ? state.data.tables[0].id : null;
          }
          saveData(state.data);
          if (state.data.tables.length === 0) {
            showScreen('empty');
          } else {
            renderBoard();
            showScreen('board');
          }
        }
        hideDeleteConfirm();
        closeDrawer();
      }

      dom.deleteCancel.addEventListener('click', hideDeleteConfirm);
      dom.deleteConfirmBtn.addEventListener('click', deleteTable);

      dom.btnGenerate.addEventListener('click', createOrUpdateTable);
      dom.btnCreateFirst.addEventListener('click', () => openCreate(null));
      dom.btnReset.addEventListener('click', resetBoard);
      dom.btnShuffle.addEventListener('click', shuffleBoard);
      dom.btnEdit.addEventListener('click', () => {
        const id = state.data.activeId;
        if (id) openCreate(id);
      });
      dom.btnDelete.addEventListener('click', () => {
        const t = state.activeTable;
        if (t) showDeleteConfirm(t.id, t.name);
      });
      dom.wordsInput.addEventListener('input', updateWordsHints);

      function init() {
        if (state.data.tables.length === 0) {
          showScreen('empty');
          return;
        }
        if (state.data.activeId && state.data.tables.some(t => t.id === state.data.activeId)) {
          renderBoard();
          showScreen('board');
        } else {
          state.data.activeId = state.data.tables[0].id;
          saveData(state.data);
          renderBoard();
          showScreen('board');
        }
      }

      init();
    })();
  </script>
</body>
</html>
